<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Realtime Chat</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>

    <style>

        body{
            margin:0;
            font-family: "Segoe UI", sans-serif;
            background:#020617;
            overflow:hidden;
        }

        /* Aurora Glow Background */

        body::before{
            content:"";
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;

            background:
                    radial-gradient(circle at 20% 30%, rgba(34,197,94,0.35), transparent 40%),
                    radial-gradient(circle at 80% 20%, rgba(16,185,129,0.25), transparent 40%),
                    radial-gradient(circle at 50% 80%, rgba(22,163,74,0.30), transparent 50%);

            filter: blur(120px);
            animation: auroraMove 18s ease-in-out infinite alternate;

            z-index:-3;
        }

        /* Star Layer */

        body::after{
            content:"";
            position:fixed;
            width:100%;
            height:100%;
            background-image:
                    radial-gradient(2px 2px at 20px 30px,#ffffff,transparent),
                    radial-gradient(2px 2px at 200px 150px,#ffffff,transparent),
                    radial-gradient(1px 1px at 300px 250px,#ffffff,transparent),
                    radial-gradient(2px 2px at 500px 350px,#ffffff,transparent),
                    radial-gradient(1px 1px at 600px 100px,#ffffff,transparent);

            background-size:600px 600px;
            opacity:0.5;

            z-index:-2;
        }

        /* Aurora movement */

        @keyframes auroraMove{

            0%{
                transform:translateX(-30px) translateY(0px);
            }

            50%{
                transform:translateX(40px) translateY(-20px);
            }

            100%{
                transform:translateX(-40px) translateY(20px);
            }

        }

        /* Snow Layer */

        .snow{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            pointer-events:none;
            z-index:-1;
        }

        .snow span{
            position:absolute;
            top:-10px;
            width:4px;
            height:4px;
            background:white;
            border-radius:50%;
            opacity:0.8;
            animation:snowFall linear infinite;
        }

        @keyframes snowFall{
            0%{
                transform:translateY(-10px);
            }
            100%{
                transform:translateY(100vh);
            }
        }

        /* Glass Chat Container */

        .chat-container{
            backdrop-filter: blur(16px);
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        /* Message bubble */

        .message{
            padding:8px 14px;
            border-radius:12px;
            margin-bottom:6px;
            max-width:75%;
            word-wrap:break-word;
        }

    </style>

</head>

<body>

<div class="snow" id="snow"></div>

<div class="flex justify-center items-center min-h-screen">

    <div class="chat-container w-[420px] p-5">

        <h1 class="text-white text-2xl font-bold text-center mb-4">
            💬 Realtime Chat
        </h1>

        <div id="chat"
             class="h-[320px] overflow-y-auto flex flex-col p-3 bg-white/10 rounded-lg mb-4 text-white">
        </div>

        <input id="senderInput"
               class="w-full p-2 mb-2 rounded bg-white/20 text-white placeholder-gray-300"
               placeholder="Your name"/>

        <div class="flex gap-2">

            <input id="messageInput"
                   class="flex-1 p-2 rounded bg-white/20 text-white placeholder-gray-300"
                   placeholder="Type message..."/>

            <button id="sendMessage"
                    class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded text-white">
                Send
            </button>

        </div>

    </div>
</div>

<script>

    /* Snow particles generator */

    const snowContainer = document.getElementById("snow");

    for(let i=0;i<120;i++){

    let snow = document.createElement("span");

    snow.style.left = Math.random()*100 + "vw";

    snow.style.animationDuration = (4 + Math.random()*15) + "s";

    snow.style.opacity = Math.random();

    snow.style.transform = "scale(" + Math.random() + ")";

    snowContainer.appendChild(snow);

    }

    /* WebSocket Chat Logic */

    let stompClient = null;

    function setConnected(connected){
    document.getElementById('sendMessage').disabled = !connected;
    }

    function connect(){

    var socket = new SockJS('/chat');

    stompClient = Stomp.over(socket);

    stompClient.connect({}, function(frame){

    setConnected(true);

    stompClient.subscribe('/topic/messages', function(message){

    showMessage(JSON.parse(message.body));

    });

    });

    }

    function showMessage(message){

    var chat = document.getElementById('chat');

    var messageElement = document.createElement('div');

    messageElement.className = "message bg-white/20";

    messageElement.textContent = message.sender + ": " + message.content;

    chat.appendChild(messageElement);

    chat.scrollTop = chat.scrollHeight;

    }

    function sendMessage(){

    var sender = document.getElementById('senderInput').value;

    var content = document.getElementById('messageInput').value;

    var chatMessage = {
    sender: sender,
    content: content
    };

    stompClient.send("/app/sendMessage", {}, JSON.stringify(chatMessage));

    document.getElementById('messageInput').value ='';

    }

    document.getElementById('sendMessage').onclick = sendMessage;

    window.onload = connect;

</script>

</body>
</html>
